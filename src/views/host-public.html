<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{HOST_NAME}} — Silver Glider Events</title>
  <meta name="description" content="Upcoming events presented by {{HOST_NAME}}.">
  <meta property="og:title" content="{{HOST_NAME}}">
  <meta property="og:description" content="Upcoming events presented by {{HOST_NAME}}.">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/brand.css">
  <style>
    body { background:#0e0e0e; }
    .host-page-bg { position:fixed;inset:0;z-index:-1;opacity:.52; }
    .host-shell { width:min(100% - 40px, 1080px);margin:0 auto;padding:58px 0 90px; }
    .host-brand { display:inline-block;color:var(--sg-text-faint);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.22em;margin-bottom:58px; }
    .host-brand:hover { color:var(--sg-accent); }
    .host-header { display:flex;align-items:center;gap:22px;margin-bottom:48px; }
    .host-logo { width:88px;height:88px;object-fit:contain;border-radius:22px;background:rgba(255,255,255,.045);border:1px solid var(--sg-border);padding:8px; }
    .host-eyebrow { color:var(--sg-text-faint);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;margin-bottom:7px; }
    .host-header h1 { font-size:clamp(38px,7vw,68px);overflow-wrap:anywhere; }
    .host-section-title { font-family:var(--sg-font-body);font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--sg-text-faint);margin-bottom:16px; }
    .host-event-grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px; }
    .host-event-card { display:block;color:var(--sg-text);background:rgba(17,17,17,.78);border:1px solid var(--sg-border-soft);border-radius:22px;overflow:hidden;transition:transform .16s ease,border-color .16s ease; }
    .host-event-card:hover { transform:translateY(-2px);border-color:rgba(28,197,190,.4); }
    .host-event-art { aspect-ratio:16/9;background:var(--sg-surface);overflow:hidden; }
    .host-event-art img,.host-event-placeholder { display:block;width:100%;height:100%;object-fit:cover; }
    .host-event-copy { padding:19px 20px 22px; }
    .host-event-copy p { color:var(--sg-accent);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px; }
    .host-event-copy h2 { font-size:24px;margin-bottom:8px; }
    .host-event-copy span { color:var(--sg-text-dim);font-size:13px; }
    .host-empty { grid-column:1/-1;padding:48px 28px;border:1px solid var(--sg-border-soft);border-radius:22px;background:rgba(17,17,17,.55);text-align:center; }
    .host-empty h2 { font-size:25px;margin-bottom:7px; }
    .host-empty p { color:var(--sg-text-dim);font-size:14px; }
    .host-footer { margin-top:70px;padding-top:22px;border-top:1px solid var(--sg-border-soft);font-size:12px;color:var(--sg-text-faint); }
    .host-footer a { color:var(--sg-text-dim);font-weight:700; }
    @media (max-width:680px) {
      .host-shell { padding-top:34px; }
      .host-brand { margin-bottom:42px; }
      .host-header { align-items:center;flex-direction:column;margin-bottom:48px;gap:17px;text-align:center; }
      .host-logo { width:72px;height:72px;border-radius:18px; }
      .host-event-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="host-page-bg bg-aurora" aria-hidden="true"></div>
  <main class="host-shell">
    <a class="host-brand" href="/">Silver Glider Events</a>
    <header class="host-header">
      {{HOST_LOGO}}
      <div>
        <p class="host-eyebrow">Events presented by</p>
        <h1>{{HOST_NAME}}</h1>
      </div>
    </header>
    <section aria-labelledby="upcoming-title">
      <h2 class="host-section-title" id="upcoming-title">Upcoming events</h2>
      <div class="host-event-grid">{{EVENT_CARDS}}</div>
    </section>
    <footer class="host-footer">Powered by <a href="/">Silver Glider</a></footer>
  </main>
</body>
</html>
