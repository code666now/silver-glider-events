<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Event — Silver Glider Events</title>
  <link rel="stylesheet" href="/css/brand.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .cover-drop {
      position: relative;
      border: 1px dashed var(--sg-border);
      border-radius: var(--sg-radius-card);
      background: var(--sg-surface);
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.15s ease;
      margin-bottom: 24px;
    }
    .cover-drop:hover, .cover-drop.dragover { border-color: var(--sg-accent); }
    .cover-drop img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .cover-drop .hint { color: var(--sg-text-faint); font-size: 13px; text-align: center; padding: 0 20px; z-index: 1; }
    .cover-drop.has-image .hint { display: none; }
    .cover-progress {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--sg-accent); width: 0%; transition: width 0.2s ease;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .vis-toggle { display: flex; gap: 10px; }
    .vis-toggle button {
      flex: 1; padding: 12px; border-radius: 999px; font-family: var(--sg-font-body);
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: var(--sg-surface); color: var(--sg-text-dim); border: 1px solid var(--sg-border);
    }
    .vis-toggle button.on { background: rgba(28,197,190,0.12); color: var(--sg-accent); border-color: var(--sg-accent); }
    .admission-fields { display: none; }
    .admission-fields.show { display: grid; }
    .places-status {
      margin-top: 7px;
      color: var(--sg-text-faint);
      font-size: 11px;
      min-height: 14px;
    }
    .pac-container {
      background: #141416;
      border: 1px solid var(--sg-border);
      border-radius: 14px;
      box-shadow: var(--sg-shadow);
      color: var(--sg-text);
      font-family: var(--sg-font-body);
      overflow: hidden;
      z-index: 2000;
    }
    .pac-item {
      border-top: 1px solid var(--sg-border-soft);
      color: var(--sg-text-dim);
      cursor: pointer;
      padding: 9px 12px;
    }
    .pac-item:hover,
    .pac-item-selected {
      background: rgba(28,197,190,.1);
    }
    .pac-item-query { color: var(--sg-text); }
    .pac-matched { color: var(--sg-accent); }
    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      --picker-bg-a: #0f403f;
      --picker-bg-b: #2b2450;
      --picker-bg-c: #6c4a1c;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(10px);
    }
    .image-modal.open { display: flex; }
    .image-modal-card {
      position: relative;
      width: min(920px, 100%);
      height: min(820px, calc(100vh - 36px));
      max-height: min(820px, calc(100vh - 36px));
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #101012;
      border: 1px solid var(--sg-border);
      border-radius: 22px;
      box-shadow: var(--sg-shadow);
    }
    .image-modal-card::before,
    .image-modal-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .image-modal-card::before {
      z-index: 0;
      opacity: .78;
      background:
        radial-gradient(circle at 18% 20%, color-mix(in srgb, var(--picker-bg-a) 88%, transparent) 0 18%, transparent 42%),
        radial-gradient(circle at 82% 22%, color-mix(in srgb, var(--picker-bg-b) 82%, transparent) 0 17%, transparent 40%),
        radial-gradient(circle at 54% 92%, color-mix(in srgb, var(--picker-bg-c) 78%, transparent) 0 20%, transparent 46%),
        linear-gradient(135deg, #09090b 0%, #121216 55%, #070708 100%);
      background-size: 135% 135%, 145% 145%, 150% 150%, 100% 100%;
      filter: saturate(.82) brightness(.82);
      transform: scale(1.04);
      transition: opacity .42s ease, filter .42s ease, background .42s ease;
      animation: picker-bg-drift 15s ease-in-out infinite alternate;
    }
    .image-modal-card::after {
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(8,8,10,.78), rgba(8,8,10,.9)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 42%);
    }
    .image-modal-card > * {
      position: relative;
      z-index: 2;
    }
    .image-modal.picker-bg-film .image-modal-card::after,
    .image-modal.picker-bg-textures .image-modal-card::after,
    .image-modal.picker-bg-nostalgia .image-modal-card::after {
      background:
        linear-gradient(180deg, rgba(8,8,10,.77), rgba(8,8,10,.9)),
        repeating-radial-gradient(circle at 18% 12%, rgba(255,255,255,.04) 0 1px, transparent 1px 5px);
      animation: picker-grain-drift 7s steps(4, end) infinite;
    }
    .image-modal.picker-bg-patterns .image-modal-card::after,
    .image-modal.picker-bg-urban .image-modal-card::after {
      background:
        linear-gradient(180deg, rgba(8,8,10,.8), rgba(8,8,10,.92)),
        repeating-linear-gradient(90deg, rgba(28,197,190,.08) 0 1px, transparent 1px 54px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, transparent 1px 54px);
      animation: picker-grid-drift 18s linear infinite;
    }
    .image-modal.picker-bg-photo .image-modal-card::before {
      opacity: .86;
      filter: saturate(.74) brightness(.76);
    }
    .image-modal.picker-bg-updating .image-modal-card::before {
      opacity: .48;
    }
    @keyframes picker-bg-drift {
      0% { background-position: 0% 10%, 100% 6%, 48% 100%, 0 0; }
      50% { background-position: 34% 30%, 70% 28%, 60% 78%, 0 0; }
      100% { background-position: 12% 54%, 88% 44%, 42% 66%, 0 0; }
    }
    @keyframes picker-grain-drift {
      0%, 100% { transform: translate3d(0,0,0); }
      25% { transform: translate3d(-1%,1%,0); }
      50% { transform: translate3d(1%,-1%,0); }
      75% { transform: translate3d(-.5%,-.5%,0); }
    }
    @keyframes picker-grid-drift {
      from { background-position: 0 0, 0 0, 0 0; }
      to { background-position: 0 0, 54px 0, 0 54px; }
    }
    .image-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--sg-border-soft);
    }
    .image-modal-head h2 { font-size: 24px; }
    .image-modal-close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--sg-border);
      background: var(--sg-surface);
      color: var(--sg-text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }
    .image-modal-body {
      flex: 1;
      min-height: 0;
      padding: 18px 22px 22px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .image-modal-head,
    .image-modal-body,
    .image-modal-foot {
      background: rgba(16,16,18,.42);
      backdrop-filter: blur(18px);
    }
    .picker-upload {
      position: relative;
      min-height: 96px;
      border: 1px dashed rgba(28,197,190,0.35);
      border-radius: 16px;
      background: rgba(15,26,27,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .picker-upload:hover, .picker-upload.dragover {
      border-color: var(--sg-accent);
      background: rgba(28,197,190,0.1);
    }
    .picker-upload strong { display: block; color: var(--sg-text); font-size: 15px; }
    .picker-upload span { color: var(--sg-text-faint); font-size: 12px; }
    .picker-search {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .picker-search .sg-input {
      background: rgba(13,13,15,.7);
      border-color: rgba(255,255,255,.13);
    }
    .picker-search .sg-btn { padding: 0 20px; }
    .picker-cats {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      padding-bottom: 3px;
      scroll-behavior: smooth;
    }
    .picker-cats::-webkit-scrollbar { display: none; }
    .picker-cat {
      border: 1px solid var(--sg-border);
      border-radius: 999px;
      background: rgba(19,19,22,.7);
      color: var(--sg-text-dim);
      padding: 9px 13px;
      font-family: var(--sg-font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }
    .picker-cat:hover { transform: translateY(-1px); border-color: rgba(28,197,190,0.38); color: var(--sg-text); }
    .picker-cat.on {
      color: var(--sg-accent);
      border-color: rgba(28,197,190,0.65);
      background: rgba(28,197,190,0.11);
      box-shadow: 0 0 0 1px rgba(28,197,190,0.08) inset;
    }
    .picker-status {
      min-height: 20px;
      color: var(--sg-text-faint);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .picker-photo {
      position: relative;
      padding: 0;
      border: 1px solid var(--sg-border-soft);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(19,19,22,.74);
      aspect-ratio: 4 / 3;
      cursor: pointer;
    }
    .picker-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    .picker-photo:hover img { transform: scale(1.035); }
    .picker-photo.selected {
      border-color: var(--sg-accent);
      box-shadow: 0 0 0 2px rgba(28,197,190,0.26);
    }
    .picker-photo.selected::after {
      content: 'Selected';
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--sg-accent);
      color: #071010;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
    }
    .picker-empty {
      border: 1px solid var(--sg-border-soft);
      border-radius: 16px;
      padding: 34px 18px;
      color: var(--sg-text-dim);
      text-align: center;
      background: rgba(255,255,255,0.03);
    }
    .picker-more {
      width: 100%;
      margin-top: 14px;
      border: 1px solid var(--sg-border);
      border-radius: 999px;
      background: rgba(19,19,22,.72);
      color: var(--sg-text-dim);
      padding: 12px 18px;
      font-family: var(--sg-font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .picker-more:hover { border-color: var(--sg-accent); color: var(--sg-accent); }
    .picker-more[hidden] { display: none; }
    .picker-more:disabled { cursor: default; opacity: .65; }
    .image-modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 22px 20px;
      border-top: 1px solid var(--sg-border-soft);
    }
    @media (prefers-reduced-motion: reduce) {
      .image-modal-card::before,
      .image-modal-card::after,
      .picker-cats {
        animation: none !important;
        scroll-behavior: auto;
      }
      .picker-cat,
      .picker-photo img {
        transition: none;
      }
    }
    @media (max-width: 640px) {
      .image-modal { padding: 0; align-items: stretch; }
      .image-modal-card {
        height: 100dvh;
        max-height: none;
        min-height: 100vh;
        border-radius: 0;
      }
      .image-modal-head { padding: 16px; }
      .image-modal-body { padding: 16px; }
      .picker-search { flex-direction: column; }
      .picker-search .sg-btn { padding: 13px 18px; }
      .picker-cats {
        padding-bottom: 4px;
        margin-left: -16px;
        margin-right: -16px;
        padding-left: 16px;
        padding-right: 16px;
      }
      .picker-cat { padding: 11px 14px; }
      .picker-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .picker-photo { border-radius: 16px; }
      .image-modal-foot { padding: 14px 16px 18px; }
    }
  </style>
</head>
<body>
  <div class="sg-shell">
    <nav id="nav"></nav>
    <h1 class="sg-page-title" id="page-title">Create Event</h1>
    <p class="sg-page-sub">Only four fields are required. You can edit everything later.</p>

    <p id="error" style="display:none;color:var(--sg-danger);font-size:14px;margin-bottom:18px"></p>

    <form id="event-form">
      <div class="cover-drop" id="cover-drop">
        <img id="cover-preview" alt="" style="display:none">
        <p class="hint">Add a cover image<br><span style="font-size:11px">JPG, PNG, or WebP · up to 5 MB · optional</span></p>
        <div class="cover-progress" id="cover-progress"></div>
        <input type="file" id="cover-input" accept="image/*" style="display:none">
      </div>

      <div id="cover-actions" style="display:flex;gap:8px;margin:-12px 0 22px">
        <button type="button" class="sg-btn sg-btn-ghost" id="btn-upload" style="flex:1;padding:9px;font-size:13px">Choose image</button>
        <button type="button" class="sg-btn sg-btn-ghost" id="btn-search" style="flex:1;padding:9px;font-size:13px;display:none">Browse free photos</button>
        <button type="button" class="sg-btn sg-btn-ghost" id="btn-clear-cover" style="flex:0;padding:9px 14px;font-size:13px;display:none">Remove</button>
      </div>

      <div class="image-modal" id="image-modal" aria-hidden="true">
        <div class="image-modal-card" role="dialog" aria-modal="true" aria-labelledby="image-modal-title">
          <div class="image-modal-head">
            <h2 id="image-modal-title">Choose event image</h2>
            <button type="button" class="image-modal-close" id="image-modal-close" aria-label="Close image picker">×</button>
          </div>
          <div class="image-modal-body">
            <div class="picker-upload" id="picker-upload">
              <p><strong>Upload a photo</strong><span>JPG, PNG, or WebP · up to 5 MB</span></p>
            </div>
            <div id="unsplash-panel">
              <div class="picker-search">
                <input class="sg-input" id="unsplash-q" placeholder="Search free photos">
                <button type="button" class="sg-btn sg-btn-primary" id="unsplash-go">Search</button>
              </div>
              <div class="picker-cats" id="image-categories"></div>
              <p class="picker-status" id="unsplash-status"></p>
              <div class="picker-grid" id="unsplash-results"></div>
              <button type="button" class="picker-more" id="photo-load-more" hidden>Load more photos</button>
              <p style="font-size:11px;color:var(--sg-text-faint);margin-top:12px">Photos via Unsplash. The photographer is credited on your event page.</p>
            </div>
          </div>
          <div class="image-modal-foot">
            <button type="button" class="sg-btn sg-btn-ghost" id="image-modal-done">Done</button>
          </div>
        </div>
      </div>

      <input type="hidden" id="cover_image_url">
      <input type="hidden" id="cover_credit_name">
      <input type="hidden" id="cover_credit_link">

      <div class="sg-field" id="fallback-background-field">
        <label>Background <span style="opacity:.5;text-transform:none;letter-spacing:0">— color or moving effect behind your page</span></label>
        <div id="theme-picker" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"></div>
        <input type="hidden" id="background_theme" value="midnight">
      </div>

      <div class="sg-field">
        <label for="title">Title</label>
        <input class="sg-input" id="title" maxlength="140" required placeholder="Vinyl Night at Make Out Room">
      </div>

      <div class="sg-field">
        <label for="description">Description <span style="opacity:.5;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea class="sg-textarea" id="description" placeholder="What should people know?"></textarea>
      </div>

      <div class="sg-field">
        <label for="event_vibe_url">What does this event sound like? <span style="opacity:.5;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="sg-input" id="event_vibe_url" inputmode="url" placeholder="Paste a Bandcamp, YouTube, SoundCloud, Spotify, or playlist link.">
      </div>

      <div class="row2">
        <div class="sg-field">
          <label for="event_date">Date</label>
          <input class="sg-input" type="date" id="event_date" required>
        </div>
        <div class="sg-field">
          <label for="start_time">Start time</label>
          <input class="sg-input" type="time" id="start_time" required>
        </div>
      </div>

      <div class="sg-field">
        <label for="venue_name">Venue name</label>
        <input class="sg-input" id="venue_name" maxlength="140" required placeholder="Make Out Room">
        <p class="places-status" id="places-status"></p>
      </div>

      <div class="sg-field">
        <label for="venue_address">Address <span style="opacity:.5;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="sg-input" id="venue_address" placeholder="3225 22nd St, San Francisco">
      </div>
      <input type="hidden" id="venue_city">
      <input type="hidden" id="venue_state">
      <input type="hidden" id="venue_latitude">
      <input type="hidden" id="venue_longitude">
      <input type="hidden" id="google_place_id">

      <div class="row2">
        <div class="sg-field">
          <label for="category">Category</label>
          <select class="sg-select" id="category">
            <option value="">Choose…</option>
            <option>Music</option><option>Art</option><option>Market</option><option>Party</option>
            <option>Community</option><option>Food & Drink</option><option>Film</option><option>Other</option>
          </select>
        </div>
        <div class="sg-field">
          <label for="capacity">Capacity <span style="opacity:.5;text-transform:none;letter-spacing:0">(optional)</span></label>
          <input class="sg-input" type="number" id="capacity" min="1" placeholder="Unlimited">
        </div>
      </div>

      <div class="sg-field">
        <label>Admission</label>
        <div class="vis-toggle">
          <button type="button" id="admission-free" class="on">Free RSVP</button>
          <button type="button" id="admission-paid">Paid elsewhere</button>
        </div>
      </div>

      <div class="row2 admission-fields" id="ticket-fields">
        <div class="sg-field">
          <label for="ticket_price">Ticket price</label>
          <input class="sg-input" type="number" id="ticket_price" min="0.01" step="0.01" placeholder="15">
        </div>
        <div class="sg-field">
          <label for="ticket_url">Ticket link <span style="opacity:.5;text-transform:none;letter-spacing:0">(optional)</span></label>
          <input class="sg-input" type="url" id="ticket_url" placeholder="At the door, or paste https://...">
        </div>
      </div>

      <div class="sg-field">
        <label>Visibility</label>
        <div class="vis-toggle">
          <button type="button" id="vis-public" class="on">Public</button>
          <button type="button" id="vis-private">Private — link only</button>
        </div>
      </div>

      <button class="sg-btn sg-btn-primary sg-btn-block" type="submit" id="publish-btn" style="margin-top:12px">Publish Event</button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/event-form.js"></script>
</body>
</html>
