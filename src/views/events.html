<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Events — Silver Glider Events</title>
  <link rel="stylesheet" href="/css/brand.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* Swipe-to-archive rows */
    .swipe-row {
      position: relative;
      overflow: hidden;
      border-radius: var(--sg-radius-card);
      margin-bottom: 14px;
    }
    .swipe-row .sg-event-card {
      margin-bottom: 0;
      position: relative;
      z-index: 1;
      transition: transform .22s cubic-bezier(.2,.8,.2,1);
      touch-action: pan-y;            /* let vertical scroll through, capture horizontal drag */
      -webkit-user-select: none; user-select: none;
    }
    .swipe-row.dragging .sg-event-card { transition: none; }
    .swipe-row.open .sg-event-card { transform: translateX(-104px); }
    .swipe-action {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 104px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(28, 197, 190, 0.18);
      border: 1px solid rgba(28, 197, 190, 0.35);
      border-radius: var(--sg-radius-card);
    }
    .swipe-arch-btn {
      background: none; border: none; color: var(--sg-accent);
      font-family: var(--sg-font-body); font-weight: 700; font-size: 14px;
      width: 100%; height: 100%; cursor: pointer;
    }

    /* Collapsible section headers */
    .section-toggle {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer; padding: 0;
      margin-bottom: 14px;
    }
    .section-toggle .chev { color: var(--sg-accent); font-size: 12px; transition: transform .15s ease; display: inline-block; }
    .section-toggle.open .chev { transform: rotate(90deg); }

    .archive-hint { color: var(--sg-text-faint); font-size: 12px; margin: 6px 0 0; }

    /* Toast with an action button */
    .sg-toast .toast-action {
      background: none; border: none; color: var(--sg-accent);
      font-family: var(--sg-font-body); font-weight: 800; font-size: 14px;
      margin-left: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <div class="sg-shell">
    <nav id="nav"></nav>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
      <h1 class="sg-page-title" style="margin:0">My Events</h1>
      <a class="sg-btn sg-btn-primary" href="/events/new">Create Event</a>
    </div>

    <div id="upcoming-section" style="display:none">
      <p class="sg-label" style="margin-bottom:14px">Upcoming</p>
      <div id="upcoming"></div>
    </div>

    <div id="past-section" style="display:none;margin-top:36px">
      <button class="section-toggle" id="past-toggle" type="button">
        <span class="chev">▶</span><span class="sg-label" id="past-label">Past</span>
      </button>
      <div id="past" style="display:none"></div>
    </div>

    <div id="archived-section" style="display:none;margin-top:36px">
      <button class="section-toggle" id="archived-toggle" type="button">
        <span class="chev">▶</span><span class="sg-label" id="archived-label">Archived</span>
      </button>
      <div id="archived" style="display:none"></div>
      <p class="archive-hint" id="archive-hint" style="display:none">Archiving hides an event from your list. Guest lists and RSVPs are always kept.</p>
    </div>

    <div id="empty" class="sg-empty" style="display:none">
      <h3>No events yet</h3>
      <p>Create your first event in under a minute.</p>
      <a class="sg-btn sg-btn-primary" href="/events/new">Create Event</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    renderNav('events');

    // Wrap a card in a swipe-to-archive row
    function swipeWrap(ev, inner) {
      const t = (ev.title || '').replace(/"/g, '&quot;');
      return `<div class="swipe-row" data-id="${ev.id}" data-title="${t}">
        <div class="swipe-action"><button class="swipe-arch-btn" type="button">Archive</button></div>
        ${inner}
      </div>`;
    }

    // ── Swipe gesture (Pointer Events: touch swipe + mouse drag) ──
    const OPEN_PX = 104, THRESHOLD = 52;
    let row = null, startX = 0, startY = 0, horizontal = false, tracking = false, justSwiped = false;

    function closeAll(except) {
      document.querySelectorAll('.swipe-row.open').forEach(r => { if (r !== except) r.classList.remove('open'); });
    }
    function cardEl(r) { return r.querySelector('.sg-event-card'); }

    document.addEventListener('pointerdown', e => {
      const r = e.target.closest('.swipe-row');
      if (!r) { closeAll(null); return; }
      row = r; startX = e.clientX; startY = e.clientY; tracking = true; horizontal = false;
    });
    document.addEventListener('pointermove', e => {
      if (!tracking || !row) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!horizontal) {
        if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) { horizontal = true; row.classList.add('dragging'); closeAll(row); }
        else if (Math.abs(dy) > 10) { tracking = false; return; }   // vertical scroll — let it go
      }
      if (horizontal) {
        const base = row.classList.contains('open') ? -OPEN_PX : 0;
        const tx = Math.max(-OPEN_PX, Math.min(0, base + dx));
        cardEl(row).style.transform = `translateX(${tx}px)`;
      }
    });
    document.addEventListener('pointerup', () => {
      if (!row) return;
      const el = cardEl(row);
      row.classList.remove('dragging');
      const m = /translateX\((-?\d+(?:\.\d+)?)px\)/.exec(el.style.transform || '');
      const tx = m ? parseFloat(m[1]) : (row.classList.contains('open') ? -OPEN_PX : 0);
      el.style.transform = '';
      row.classList.toggle('open', tx < -THRESHOLD);
      if (horizontal) { justSwiped = true; setTimeout(() => { justSwiped = false; }, 350); }
      row = null; tracking = false; horizontal = false;
    });

    // Intercept clicks: archive/restore buttons, swallow the click that ends a swipe, close an open row
    document.addEventListener('click', e => {
      const arch = e.target.closest('.swipe-arch-btn');
      if (arch) { e.preventDefault(); handleArchive(arch.closest('.swipe-row')); return; }
      const restore = e.target.closest('.restore-btn');
      if (restore) { e.preventDefault(); handleRestore(restore.dataset.id); return; }
      if (justSwiped) { e.preventDefault(); e.stopPropagation(); return; }
      const c = e.target.closest('.sg-event-card');
      if (c) {
        const r = c.closest('.swipe-row');
        if (r && r.classList.contains('open')) { e.preventDefault(); r.classList.remove('open'); }
      }
    }, true);

    // Toast with an inline action (Undo)
    let _toastActionTimer;
    function toastWithAction(msg, actionLabel, fn) {
      let el = document.querySelector('.sg-toast');
      if (!el) {
        el = document.createElement('div');
        el.className = 'sg-toast';
        document.body.appendChild(el);
      }
      el.innerHTML = '';
      el.append(msg);
      const btn = document.createElement('button');
      btn.className = 'toast-action';
      btn.textContent = actionLabel;
      btn.addEventListener('click', () => { el.classList.remove('show'); fn(); });
      el.appendChild(btn);
      requestAnimationFrame(() => el.classList.add('show'));
      clearTimeout(_toastActionTimer);
      _toastActionTimer = setTimeout(() => el.classList.remove('show'), 6000);
    }

    // Archive is reversible — no confirm; offer Undo instead
    async function handleArchive(r) {
      if (!r) return;
      const id = r.dataset.id;
      try {
        await api(`/api/events/${id}/archive`, { method: 'POST' });
        r.style.height = r.offsetHeight + 'px';
        r.style.transition = 'height .2s ease, opacity .2s ease, margin .2s ease';
        requestAnimationFrame(() => { r.style.height = '0'; r.style.opacity = '0'; r.style.marginBottom = '0'; });
        setTimeout(() => { r.remove(); refreshSections(); }, 210);
        toastWithAction('Event archived', 'Undo', async () => {
          try { await api(`/api/events/${id}/unarchive`, { method: 'POST' }); load(); }
          catch (err) { toast(err.message); }
        });
      } catch (err) {
        toast(err.message);
        r.classList.remove('open');
      }
    }

    async function handleRestore(id) {
      try {
        await api(`/api/events/${id}/unarchive`, { method: 'POST' });
        toast('Event restored');
        load();
      } catch (err) { toast(err.message); }
    }

    function refreshSections() {
      const up = document.getElementById('upcoming');
      const pa = document.getElementById('past');
      if (!up.children.length) document.getElementById('upcoming-section').style.display = 'none';
      if (!pa.children.length) document.getElementById('past-section').style.display = 'none';
      else document.getElementById('past-label').textContent = `Past (${pa.children.length})`;
      const archivedVisible = document.getElementById('archived-section').style.display !== 'none';
      if (!up.children.length && !pa.children.length && !archivedVisible) {
        document.getElementById('empty').style.display = 'block';
      }
    }

    function card(ev) {
      const dateStr = new Date(ev.event_date).toLocaleDateString('en-US',
        { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
      const badges = [
        ev.status === 'cancelled' ? '<span class="sg-badge sg-badge-danger">Cancelled</span>' : '',
        ev.status === 'draft' ? '<span class="sg-badge">Draft</span>' : '',
        ev.visibility === 'private' ? '<span class="sg-badge">Private</span>' : ''
      ].filter(Boolean).join(' ');
      return `
        <a class="sg-event-card" href="/events/${ev.id}/manage">
          ${ev.cover_image_url
            ? `<img class="sg-event-thumb" src="${ev.cover_image_url}" alt="">`
            : `<div class="sg-event-thumb placeholder">${ev.title.charAt(0).toUpperCase()}</div>`}
          <div class="sg-event-meta">
            <h3>${ev.title}</h3>
            <p>${dateStr} · ${ev.venue_name}</p>
            ${badges ? `<p style="margin-top:6px">${badges}</p>` : ''}
          </div>
          <div class="sg-event-count">
            <strong>${ev.rsvp_count}</strong>
            <span>going${ev.capacity ? ` / ${ev.capacity}` : ''}</span>
          </div>
        </a>`;
    }

    function archivedCard(ev) {
      const dateStr = new Date(ev.event_date).toLocaleDateString('en-US',
        { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
      return `
        <div class="sg-event-card" style="opacity:.75">
          ${ev.cover_image_url
            ? `<img class="sg-event-thumb" src="${ev.cover_image_url}" alt="">`
            : `<div class="sg-event-thumb placeholder">${ev.title.charAt(0).toUpperCase()}</div>`}
          <div class="sg-event-meta">
            <h3>${ev.title}</h3>
            <p>${dateStr} · ${ev.rsvp_count} RSVP${ev.rsvp_count === 1 ? '' : 's'} kept</p>
          </div>
          <button class="sg-btn sg-btn-ghost restore-btn" data-id="${ev.id}" style="padding:8px 18px;font-size:13px;flex-shrink:0">Restore</button>
        </div>`;
    }

    function wireToggle(btnId, panelId) {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const panel = document.getElementById(panelId);
        const open = panel.style.display !== 'none';
        panel.style.display = open ? 'none' : 'block';
        btn.classList.toggle('open', !open);
        if (panelId === 'archived') document.getElementById('archive-hint').style.display = open ? 'none' : 'block';
      });
    }
    wireToggle('past-toggle', 'past');
    wireToggle('archived-toggle', 'archived');

    async function load() {
      const [{ events }, { events: archived }] = await Promise.all([
        api('/api/events'),
        api('/api/events?archived=1')
      ]);

      const today = new Date(new Date().toDateString());
      const upcoming = events.filter(e => new Date(e.event_date) >= today).reverse();
      const past = events.filter(e => new Date(e.event_date) < today);

      document.getElementById('empty').style.display =
        (!events.length && !archived.length) ? 'block' : 'none';

      document.getElementById('upcoming-section').style.display = upcoming.length ? 'block' : 'none';
      document.getElementById('upcoming').innerHTML = upcoming.map(ev => swipeWrap(ev, card(ev))).join('');

      document.getElementById('past-section').style.display = past.length ? 'block' : 'none';
      document.getElementById('past-label').textContent = `Past (${past.length})`;
      document.getElementById('past').innerHTML = past.map(ev => swipeWrap(ev, card(ev))).join('');

      document.getElementById('archived-section').style.display = archived.length ? 'block' : 'none';
      document.getElementById('archived-label').textContent = `Archived (${archived.length})`;
      document.getElementById('archived').innerHTML = archived.map(archivedCard).join('');
    }
    load();
  </script>
</body>
</html>
